<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Quotecloud</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f7f7f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:4px;padding:48px;width:100%;max-width:400px}
.logo{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin-bottom:32px}
h1{font-size:1.3rem;font-weight:600;color:#000;margin-bottom:8px}
p{font-size:0.85rem;color:#777;line-height:1.7;margin-bottom:28px}
label{display:block;font-family:'Space Mono',monospace;font-size:0.58rem;text-transform:uppercase;letter-spacing:0.15em;color:#777;margin-bottom:8px}
input{width:100%;border:1.5px solid #e5e5e5;border-radius:2px;padding:13px 14px;font-family:'Inter',sans-serif;font-size:0.9rem;color:#000;outline:none;transition:border-color 0.2s;margin-bottom:20px}
input:focus{border-color:#000}
button{width:100%;background:#000;color:#fff;border:none;padding:14px;font-family:'Space Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;cursor:pointer;border-radius:2px;transition:opacity 0.2s}
button:hover{opacity:0.85}
button:disabled{opacity:0.5;cursor:not-allowed}
.msg{padding:12px 14px;border-radius:2px;font-size:0.82rem;margin-top:16px;display:none}
.msg.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.msg.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.error-card{background:#fef2f2;border:1px solid #fecaca;border-radius:2px;padding:16px;margin-bottom:20px;font-size:0.85rem;color:#991b1b}
.back{display:block;text-align:center;margin-top:20px;font-size:0.8rem;color:#999;text-decoration:none}
.back:hover{color:#000}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Quotecloud · Admin</div>
  {% if not valid %}
    <h1>Link invalid</h1>
    <div class="error-card">{{ error }}</div>
    <a href="/forgot-password" style="display:block;background:#000;color:#fff;padding:14px;text-align:center;text-decoration:none;font-family:'Space Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;border-radius:2px">Request New Link</a>
  {% else %}
    <h1>Set new password</h1>
    <p>Choose a strong password for your admin account.</p>
    <label>New Password</label>
    <input type="password" id="new-pass" placeholder="At least 6 characters">
    <label>Confirm Password</label>
    <input type="password" id="confirm-pass" placeholder="Repeat new password">
    <button id="submit-btn" onclick="submitReset()">Set New Password</button>
    <div id="msg" class="msg"></div>
  {% endif %}
  <a href="/login" class="back">← Back to login</a>
</div>
<script>
async function submitReset() {
  let newPass = document.getElementById('new-pass').value;
  let confirmPass = document.getElementById('confirm-pass').value;
  let btn = document.getElementById('submit-btn');
  let msg = document.getElementById('msg');
  if (!newPass || newPass.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
  if (newPass !== confirmPass) { showMsg('Passwords do not match.', 'error'); return; }
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    let r = await fetch('/reset-password/{{ token }}', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ new_password: newPass, confirm_password: confirmPass })
    });
    let data = await r.json();
    if (data.success) {
      showMsg('Password updated. Redirecting to admin login...', 'success');
      setTimeout(() => { window.location.href = 'https://quote.jetman.co.ke/login'; }, 2000);
    } else {
      showMsg(data.error || 'Something went wrong.', 'error');
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  } catch(e) {
    showMsg('Network error. Please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Set New Password';
  }
}
function showMsg(text, type) {
  let el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = 'block';
}
</script>
</body>
</html>
