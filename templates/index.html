<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ operator.company_name }} — Admin</title>
<link href="https://fonts.googleapis.com/css2?family={{ operator.branding.font_heading }}:wght@400;600;700&family={{ operator.branding.font_body }}:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: '{{ operator.branding.font_body }}', sans-serif; background: {{ operator.branding.background_color }}; color: {{ operator.branding.text_color }}; }
header {
  background: {{ operator.branding.header_bg }};
  color: {{ operator.branding.header_text }};
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-left img { height: 40px; }
.header-left h1 { font-family: '{{ operator.branding.font_heading }}', sans-serif; font-size: 1.1rem; font-weight: 700; }
.header-left span { font-size: 0.8rem; opacity: 0.7; }
.logout { color: {{ operator.branding.header_text }}; text-decoration: none; font-size: 0.85rem; opacity: 0.8; }
.logout:hover { opacity: 1; }
.nav-tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #e0e0e0; padding: 0 24px; }
.nav-tab {
  padding: 14px 24px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9rem;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  color: #666;
  transition: all 0.2s;
}
.nav-tab.active { color: {{ operator.branding.primary_color }}; border-bottom-color: {{ operator.branding.primary_color }}; }
.tab-content { display: none; padding: 24px; }
.tab-content.active { display: block; }
.card { background: #fff; border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.mission-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.mtab {
  padding: 8px 20px;
  border-radius: 20px;
  border: 2px solid {{ operator.branding.primary_color }};
  color: {{ operator.branding.primary_color }};
  background: #fff;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.mtab.active { background: {{ operator.branding.primary_color }}; color: #fff; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.form-group { flex: 1; min-width: 200px; }
label { font-size: 0.82rem; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  font-size: 0.95rem;
  outline: none;
  font-family: inherit;
  transition: border 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: {{ operator.branding.primary_color }}; }
.btn {
  padding: 10px 24px;
  background: {{ operator.branding.button_color }};
  color: {{ operator.branding.button_text }};
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  font-family: '{{ operator.branding.font_heading }}', sans-serif;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.88; }
.btn-outline {
  background: #fff;
  color: {{ operator.branding.primary_color }};
  border: 2px solid {{ operator.branding.primary_color }};
}
.btn-sm { padding: 6px 14px; font-size: 0.82rem; }
.btn-danger { background: #dc3545; color: #fff; }
.result-box { margin-top: 20px; }
.ac-card { background: #f8f9fa; border-radius: 10px; padding: 20px; margin-bottom: 16px; border-left: 4px solid {{ operator.branding.primary_color }}; }
.ac-title { font-family: '{{ operator.branding.font_heading }}', sans-serif; font-size: 1rem; font-weight: 700; color: {{ operator.branding.primary_color }}; margin-bottom: 12px; }
.route-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 12px; }
.route-table th { background: {{ operator.branding.primary_color }}; color: #fff; padding: 8px 10px; text-align: left; }
.route-table td { padding: 8px 10px; border-bottom: 1px solid #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
.tag-rev { background: #d4edda; color: #155724; }
.tag-pos { background: #fff3cd; color: #856404; }
.tag-dep { background: #f8d7da; color: #721c24; }
.tag-rep { background: #cce5ff; color: #004085; }
.billing { background: #fff; border-radius: 8px; padding: 14px; border: 1px solid #eee; }
.billing-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; }
.billing-total { font-weight: 700; font-size: 1.1rem; color: {{ operator.branding.primary_color }}; border-top: 2px solid {{ operator.branding.primary_color }}; margin-top: 6px; padding-top: 8px; }
.option-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.otab { padding: 6px 16px; border-radius: 16px; border: 1.5px solid #999; color: #666; background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
.otab.active { background: {{ operator.branding.accent_color }}; color: #fff; border-color: {{ operator.branding.accent_color }}; }
.otab-content { display: none; }
.otab-content.active { display: block; }
.pdf-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
.pdf-section h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; color: {{ operator.branding.primary_color }}; }
.error-box { background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 0.9rem; }
.success-box { background: #f0fff4; border: 1px solid #b2dfdb; color: #1b5e20; border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 0.9rem; }
.db-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.db-table th { background: {{ operator.branding.primary_color }}; color: #fff; padding: 10px 12px; text-align: left; }
.db-table td { padding: 10px 12px; border-bottom: 1px solid #eee; }
.db-table tr:hover td { background: #f8f9fa; }
.badge-system { background: #e3e8f0; color: #444; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; }
.badge-user { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; }
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.search-bar input { flex: 1; }
.leg-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.leg-row input { flex: 1; min-width: 140px; }
.leg-num { font-weight: 700; color: {{ operator.branding.primary_color }}; min-width: 24px; }
@media(max-width:600px) {
  .form-row { flex-direction: column; }
  .mission-tabs { flex-wrap: wrap; }
  .nav-tabs { overflow-x: auto; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="{{ operator.logo_url }}" alt="{{ operator.company_name }}">
    <div>
      <h1>{{ operator.company_name }}</h1>
      <span>Admin Tool — Quotecloud v1.0.0</span>
    </div>
  </div>
  <a href="/logout" class="logout">Logout</a>
</header>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showNav('quote')">Quote</div>
  <div class="nav-tab" onclick="showNav('locations')">Locations DB</div>
  <div class="nav-tab" onclick="showNav('aircraft')">Aircraft</div>
</div>

<!-- QUOTE TAB -->
<div class="tab-content active" id="nav-quote">
  <div class="card">
    <div class="mission-tabs">
      <div class="mtab active" onclick="showMission('one_way')">One Way</div>
      <div class="mtab" onclick="showMission('return')">Return</div>
      <div class="mtab" onclick="showMission('safari')">Safari</div>
    </div>

    <!-- ONE WAY -->
    <div id="m-one_way">
      <div class="form-row">
        <div class="form-group">
          <label>From</label>
          <input type="text" id="ow-pickup" placeholder="Location name, GPS or Google Maps link">
        </div>
        <div class="form-group">
          <label>To</label>
          <input type="text" id="ow-dropoff" placeholder="Location name, GPS or Google Maps link">
        </div>
      </div>
      <button class="btn" onclick="submitQuote('one_way')">Get Quote</button>
    </div>

    <!-- RETURN -->
    <div id="m-return" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label>From</label>
          <input type="text" id="rt-pickup" placeholder="Location name, GPS or Google Maps link">
        </div>
        <div class="form-group">
          <label>To</label>
          <input type="text" id="rt-dropoff" placeholder="Location name, GPS or Google Maps link">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Departure Date</label>
          <input type="text" id="rt-depart" placeholder="e.g. 25/06/25">
        </div>
        <div class="form-group">
          <label>Return Date</label>
          <input type="text" id="rt-return" placeholder="e.g. 27/06/25">
        </div>
      </div>
      <button class="btn" onclick="submitQuote('return')">Get Quote</button>
    </div>

    <!-- SAFARI -->
    <div id="m-safari" style="display:none">
      <div id="safari-legs">
        <div class="leg-row">
          <span class="leg-num">1</span>
          <input type="text" placeholder="From" class="leg-origin">
          <input type="text" placeholder="To" class="leg-dest">
          <input type="text" placeholder="Date e.g. 25/06/25" class="leg-date" style="max-width:150px">
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="btn btn-outline btn-sm" onclick="addLeg()">+ Add Leg</button>
        <button class="btn btn-sm" onclick="submitQuote('safari')">Get Quote</button>
      </div>
    </div>
  </div>

  <div class="result-box" id="quote-result"></div>

  <!-- PDF SECTION -->
  <div class="card pdf-section" id="pdf-section" style="display:none">
    <h3>Generate PDF</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" id="pdf-name" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="pdf-email" placeholder="client@email.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="pdf-phone" placeholder="+254...">
      </div>
      <div class="form-group">
        <label>Discount %</label>
        <input type="number" id="pdf-discount" placeholder="0" min="0" max="100">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Notes</label>
      <textarea id="pdf-notes" rows="2" placeholder="Special notes..."></textarea>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="generatePDF('Quotation')">Download Quotation</button>
      <button class="btn btn-outline" onclick="generatePDF('Invoice')">Download Invoice</button>
    </div>
  </div>
</div>

<!-- LOCATIONS TAB -->
<div class="tab-content" id="nav-locations">
  <div class="card">
    <h3 style="margin-bottom:16px;color:{{ operator.branding.primary_color }}">Add Location</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="loc-name" placeholder="e.g. Angama Mara">
      </div>
      <div class="form-group">
        <label>Latitude</label>
        <input type="text" id="loc-lat" placeholder="-1.234567">
      </div>
      <div class="form-group">
        <label>Longitude</label>
        <input type="text" id="loc-lon" placeholder="36.123456">
      </div>
      <div class="form-group">
        <label>Alias (optional)</label>
        <input type="text" id="loc-alias" placeholder="angama">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Or paste Google Maps link</label>
        <input type="text" id="loc-maps" placeholder="https://maps.app.goo.gl/...">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <button class="btn btn-outline btn-sm" onclick="resolveMapPin()">Resolve Pin</button>
      </div>
    </div>
    <button class="btn" onclick="addLocation()">Add Location</button>
    <div id="loc-msg"></div>
  </div>

  <div class="card">
    <div class="search-bar">
      <input type="text" id="loc-search" placeholder="Search locations..." oninput="filterLocations()">
    </div>
    <table class="db-table" id="loc-table">
      <thead><tr><th>Name</th><th>Lat</th><th>Lon</th><th>Alias</th><th>Type</th><th>Actions</th></tr></thead>
      <tbody id="loc-tbody"></tbody>
    </table>
  </div>
</div>

<!-- AIRCRAFT TAB -->
<div class="tab-content" id="nav-aircraft">
  <div class="card">
    <h3 style="margin-bottom:16px;color:{{ operator.branding.primary_color }}">Aircraft Fleet</h3>
    <div id="aircraft-list"></div>
    <button class="btn" style="margin-top:16px" onclick="addAircraftRow()">+ Add Aircraft</button>
    <button class="btn btn-outline" style="margin-top:16px;margin-left:10px" onclick="saveAircraft()">Save All</button>
    <div id="ac-msg"></div>
  </div>
</div>

<script>
let lastResults = [];
let allLocations = [];
let aircraftData = {};

// Nav
function showNav(tab) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'locations') loadLocations();
  if (tab === 'aircraft') loadAircraft();
}

// Mission tabs
function showMission(m) {
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  ['one_way','return','safari'].forEach(id => {
    document.getElementById('m-' + id).style.display = id === m ? 'block' : 'none';
  });
  document.getElementById('quote-result').innerHTML = '';
  document.getElementById('pdf-section').style.display = 'none';
}

// Smart date parse
function parseSmartDate(s) {
  s = s.trim().replace(/(\d+)(st|nd|rd|th)/gi, '$1');
  const fmts = [
    { r: /^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/, fn: m => {
      let y = m[3].length === 2 ? '20' + m[3] : m[3];
      return new Date(`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`);
    }},
    { r: /^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/, fn: m => new Date(`${m[2]} ${m[1]} ${m[3]}`) },
    { r: /^([A-Za-z]+)\s+(\d{1,2})\s+(\d{4})$/, fn: m => new Date(`${m[1]} ${m[2]} ${m[3]}`) },
  ];
  for (let f of fmts) {
    let m = s.match(f.r);
    if (m) {
      let d = f.fn(m);
      if (!isNaN(d)) {
        let dd = String(d.getDate()).padStart(2,'0');
        let mm = String(d.getMonth()+1).padStart(2,'0');
        let yy = String(d.getFullYear()).slice(-2);
        return `${dd}/${mm}/${yy}`;
      }
    }
  }
  return s;
}

// Safari legs
function addLeg() {
  let n = document.querySelectorAll('#safari-legs .leg-row').length + 1;
  let div = document.createElement('div');
  div.className = 'leg-row';
  div.innerHTML = `<span class="leg-num">${n}</span>
    <input type="text" placeholder="From" class="leg-origin">
    <input type="text" placeholder="To" class="leg-dest">
    <input type="text" placeholder="Date e.g. 25/06/25" class="leg-date" style="max-width:150px">
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">x</button>`;
  document.getElementById('safari-legs').appendChild(div);
}

// Submit quote
async function submitQuote(mission) {
  let body = { mission };
  if (mission === 'one_way') {
    body.pickup = document.getElementById('ow-pickup').value;
    body.dropoff = document.getElementById('ow-dropoff').value;
  } else if (mission === 'return') {
    body.pickup = document.getElementById('rt-pickup').value;
    body.dropoff = document.getElementById('rt-dropoff').value;
    body.depart = parseSmartDate(document.getElementById('rt-depart').value);
    body.return_date = parseSmartDate(document.getElementById('rt-return').value);
  } else if (mission === 'safari') {
    body.legs = [];
    document.querySelectorAll('#safari-legs .leg-row').forEach(row => {
      body.legs.push({
        origin: row.querySelector('.leg-origin').value,
        destination: row.querySelector('.leg-dest').value,
        date: parseSmartDate(row.querySelector('.leg-date').value)
      });
    });
  }
  document.getElementById('quote-result').innerHTML = '<p style="color:#888;padding:12px">Calculating...</p>';
  try {
    let r = await fetch('/admin/quote', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    let data = await r.json();
    if (!r.ok) {
      document.getElementById('quote-result').innerHTML = `<div class="error-box">${data.error || 'Error'}</div>`;
      return;
    }
    lastResults = data.results || [];
    renderResults(lastResults, mission);
    document.getElementById('pdf-section').style.display = 'block';
  } catch(e) {
    document.getElementById('quote-result').innerHTML = `<div class="error-box">Network error: ${e.message}</div>`;
  }
}

function tagClass(t) {
  return t === 'revenue' ? 'tag-rev' : t === 'positioning' ? 'tag-pos' : t === 'depositioning' ? 'tag-dep' : 'tag-rep';
}

function renderSegments(segs) {
  if (!segs || !segs.length) return '';
  let rows = segs.map(s => `<tr>
    <td><span class="tag ${tagClass(s.type)}">${s.type}</span></td>
    <td>${s.origin || ''}</td>
    <td>${s.destination || ''}</td>
    <td>${s.dist_nm || ''} nm</td>
    <td>${s.hours || ''} hr</td>
    <td>$${(s.cost_usd||0).toLocaleString()}</td>
    <td>${s.date || ''}</td>
  </tr>`).join('');
  return `<table class="route-table">
    <thead><tr><th>Type</th><th>From</th><th>To</th><th>Dist</th><th>Hours</th><th>Cost</th><th>Date</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderBilling(res) {
  let rows = '';
  if (res.subtotal_usd) rows += `<div class="billing-row"><span>Flight Cost</span><span>$${res.subtotal_usd.toLocaleString()}</span></div>`;
  if (res.overnight_cost_usd) rows += `<div class="billing-row"><span>Overnight Per Diem</span><span>$${res.overnight_cost_usd.toLocaleString()}</span></div>`;
  if (res.idle_cost_usd) rows += `<div class="billing-row"><span>Idle Day Charge</span><span>$${res.idle_cost_usd.toLocaleString()}</span></div>`;
  if (res.pax_fee_usd) rows += `<div class="billing-row"><span>Pax / Admin Fee</span><span>$${res.pax_fee_usd.toLocaleString()}</span></div>`;
  rows += `<div class="billing-row billing-total"><span>TOTAL</span><span>USD $${(res.total_usd||0).toLocaleString()}</span></div>`;
  return `<div class="billing">${rows}</div>`;
}

function renderOneAc(res) {
  if (res.error) return `<div class="error-box">${res.error}</div>`;
  if (res.mission === 'return_both') {
    let wd = res.wait_days;
    if (wd >= 3) {
      let b = res.option_b;
      return `<div style="margin-bottom:8px;font-size:0.85rem;color:#856404;background:#fff3cd;padding:8px 12px;border-radius:6px">Stay is ${wd} nights — Pick &amp; Drop only</div>
        <b>Drop Off</b>${renderSegments(b.drop.segments)}
        <b>Pick Up</b>${renderSegments(b.pick.segments)}
        ${renderBilling({subtotal_usd: b.total_usd, pax_fee_usd: 0, total_usd: b.total_usd})}`;
    }
    return `<div class="option-tabs">
      <div class="otab active" onclick="switchOtab(this,'oa')">Option A - Aircraft Waits</div>
      <div class="otab" onclick="switchOtab(this,'ob')">Option B - Pick &amp; Drop</div>
    </div>
    <div class="otab-content active" id="oa">
      ${renderSegments(res.option_a.segments)}${renderBilling(res.option_a)}
    </div>
    <div class="otab-content" id="ob">
      <b>Drop Off</b>${renderSegments(res.option_b.drop.segments)}
      <b>Pick Up</b>${renderSegments(res.option_b.pick.segments)}
      ${renderBilling({subtotal_usd: res.option_b.total_usd, pax_fee_usd: 0, total_usd: res.option_b.total_usd})}
    </div>`;
  }
  return renderSegments(res.segments) + renderBilling(res);
}

function switchOtab(el, id) {
  let parent = el.closest('.ac-card');
  parent.querySelectorAll('.otab').forEach(t => t.classList.remove('active'));
  parent.querySelectorAll('.otab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  parent.querySelector('#' + id).classList.add('active');
}

function renderResults(results, mission) {
  let html = results.map(res => `
    <div class="ac-card">
      <div class="ac-title">${res.ac_label || ''}</div>
      ${renderOneAc(res)}
    </div>`).join('');
  document.getElementById('quote-result').innerHTML = html;
}

// PDF
async function generatePDF(docType) {
  if (!lastResults.length) return alert('Run a quote first.');
  let res = lastResults[0];
  let result = res.mission === 'return_both' ? res.option_a : res;
  let body = {
    doc_type: docType,
    name: document.getElementById('pdf-name').value,
    email: document.getElementById('pdf-email').value,
    phone: document.getElementById('pdf-phone').value,
    discount: document.getElementById('pdf-discount').value || 0,
    note: document.getElementById('pdf-notes').value,
    result: result
  };
  try {
    let r = await fetch('/pdf', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) { let e = await r.json(); return alert(e.error || 'PDF failed'); }
    let blob = await r.blob();
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url; a.download = docType.toLowerCase() + '.pdf'; a.click();
  } catch(e) { alert('PDF error: ' + e.message); }
}

// Locations
async function loadLocations() {
  let r = await fetch('/airports');
  allLocations = await r.json();
  renderLocations(allLocations);
}

function filterLocations() {
  let q = document.getElementById('loc-search').value.toLowerCase();
  renderLocations(allLocations.filter(l => l.name.toLowerCase().includes(q) || (l.alias||'').includes(q)));
}

function renderLocations(locs) {
  let tbody = document.getElementById('loc-tbody');
  tbody.innerHTML = locs.map(l => `<tr>
    <td>${l.name}</td>
    <td>${l.lat}</td>
    <td>${l.lon}</td>
    <td>${l.alias || '-'}</td>
    <td><span class="${l.system ? 'badge-system' : 'badge-user'}">${l.system ? 'System' : 'User'}</span></td>
    <td>${l.system ? '' : `
      <button class="btn btn-outline btn-sm" onclick="editLocation('${l.name}',${l.lat},${l.lon},'${l.alias||''}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteLocation('${l.name}')">Delete</button>`}
    </td>
  </tr>`).join('');
}

async function resolveMapPin() {
  let url = document.getElementById('loc-maps').value.trim();
  if (!url) return;
  let r = await fetch('/resolve_pin', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url})
  });
  let data = await r.json();
  if (data.error) { showLocMsg(data.error, 'error'); return; }
  document.getElementById('loc-name').value = data.name;
  document.getElementById('loc-lat').value = data.lat;
  document.getElementById('loc-lon').value = data.lon;
}

async function addLocation() {
  let name = document.getElementById('loc-name').value.trim();
  let lat = document.getElementById('loc-lat').value.trim();
  let lon = document.getElementById('loc-lon').value.trim();
  let alias = document.getElementById('loc-alias').value.trim();
  if (!name || !lat || !lon) return showLocMsg('Name, lat and lon are required.', 'error');
  let r = await fetch('/add_airport', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, lat: parseFloat(lat), lon: parseFloat(lon), alias})
  });
  let data = await r.json();
  if (data.ok) { showLocMsg('Location added.', 'success'); loadLocations(); }
  else showLocMsg(data.error || 'Error', 'error');
}

function editLocation(name, lat, lon, alias) {
  document.getElementById('loc-name').value = name;
  document.getElementById('loc-lat').value = lat;
  document.getElementById('loc-lon').value = lon;
  document.getElementById('loc-alias').value = alias;
  showNav2('locations');
}

async function deleteLocation(name) {
  if (!confirm(`Delete ${name}?`)) return;
  let r = await fetch('/delete_airport', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  let data = await r.json();
  if (data.ok) loadLocations();
  else alert(data.error || 'Error');
}

function showLocMsg(msg, type) {
  let el = document.getElementById('loc-msg');
  el.innerHTML = `<div class="${type === 'error' ? 'error-box' : 'success-box'}" style="margin-top:10px">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 3000);
}

// Aircraft
async function loadAircraft() {
  let r = await fetch('/aircraft');
  aircraftData = await r.json();
  renderAircraft();
}

function renderAircraft() {
  let html = Object.entries(aircraftData).map(([key, ac]) => `
    <div class="ac-card" data-key="${key}">
      <div class="form-row">
        <div class="form-group"><label>Key</label><input class="ac-key" value="${key}" readonly style="background:#f5f5f5"></div>
        <div class="form-group"><label>Label</label><input class="ac-label" value="${ac.label}"></div>
        <div class="form-group"><label>Seats</label><input class="ac-seater" type="number" value="${ac.seater}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Speed (KTAS)</label><input class="ac-speed" type="number" value="${ac.speed}"></div>
        <div class="form-group"><label>Rate (USD/hr)</label><input class="ac-rate" type="number" value="${ac.rate}"></div>
        <div class="form-group"><label>Pax Fee (USD)</label><input class="ac-pax" type="number" value="${ac.pax_fee}"></div>
        <div class="form-group"><label>Active</label>
          <select class="ac-active">
            <option value="true" ${ac.active ? 'selected' : ''}>Active</option>
            <option value="false" ${!ac.active ? 'selected' : ''}>Inactive</option>
          </select>
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeAcRow(this)">Remove</button>
    </div>`).join('');
  document.getElementById('aircraft-list').innerHTML = html;
}

function addAircraftRow() {
  let key = 'aircraft_' + Date.now();
  aircraftData[key] = {label: 'New Aircraft', seater: 4, speed: 120, rate: 1500, pax_fee: 100, active: true};
  renderAircraft();
}

function removeAcRow(btn) {
  let card = btn.closest('.ac-card');
  let key = card.dataset.key;
  delete aircraftData[key];
  card.remove();
}

async function saveAircraft() {
  let data = {};
  document.querySelectorAll('#aircraft-list .ac-card').forEach(card => {
    let key = card.querySelector('.ac-key').value;
    data[key] = {
      label: card.querySelector('.ac-label').value,
      seater: parseInt(card.querySelector('.ac-seater').value),
      speed: parseFloat(card.querySelector('.ac-speed').value),
      rate: parseFloat(card.querySelector('.ac-rate').value),
      pax_fee: parseFloat(card.querySelector('.ac-pax').value),
      active: card.querySelector('.ac-active').value === 'true'
    };
  });
  let r = await fetch('/aircraft/save', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  let res = await r.json();
  let msg = document.getElementById('ac-msg');
  if (res.ok) {
    msg.innerHTML = '<div class="success-box" style="margin-top:10px">Aircraft saved.</div>';
    setTimeout(() => msg.innerHTML = '', 3000);
  } else {
    msg.innerHTML = `<div class="error-box" style="margin-top:10px">${res.error}</div>`;
  }
}

function showNav2(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[tab === 'locations' ? 1 : 0].classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
}
</script>
</body>
</html>
