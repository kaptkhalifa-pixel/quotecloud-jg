<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Jetman Global — Instant Quotes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #ffffff;
  --grey: #f5f5f3;
  --mid: #888888;
  --border: #e0e0e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); min-height: 100vh; overflow-x: hidden; }

/* TEXTURES */
.dot-grid {
  position: absolute;
  width: 180px; height: 180px;
  background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
  background-size: 12px 12px;
  opacity: 0.5;
  pointer-events: none;
}
.hatch {
  position: absolute;
  width: 120px; height: 120px;
  background-image: repeating-linear-gradient(45deg, #ccc 0, #ccc 1px, transparent 0, transparent 50%);
  background-size: 8px 8px;
  opacity: 0.4;
  pointer-events: none;
}
.blob {
  position: absolute;
  pointer-events: none;
  border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  background: var(--black);
  opacity: 0.06;
}

/* HERO */
.hero {
  position: relative;
  background: var(--white);
  padding: 0;
  overflow: hidden;
  min-height: 340px;
  border-bottom: 1px solid var(--border);
}
.hero-blob-1 {
  width: 280px; height: 280px;
  top: -60px; right: -60px;
  background: var(--black);
  opacity: 0.08;
  border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
}
.hero-blob-2 {
  width: 160px; height: 160px;
  bottom: -40px; left: -20px;
  background: var(--black);
  opacity: 0.05;
  border-radius: 40% 60% 45% 55% / 60% 40% 60% 40%;
}
.hero-dot {
  top: 40px; left: 20px;
}
.hero-hatch {
  bottom: 20px; right: 30px;
}

.header {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 24px 0;
}
.logo-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1.5px solid var(--black);
  border-radius: 4px;
  padding: 7px 14px;
  background: var(--white);
}
.logo-pill img {
  height: 28px;
  width: auto;
  object-fit: contain;
  filter: grayscale(100%) contrast(200%);
}
.logo-pill span {
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--black);
}
.header-tagline {
  font-size: 0.7rem;
  color: var(--mid);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 32px 24px 36px;
}
.hero-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.hero-label::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--mid);
}
.hero-headline {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 900;
  line-height: 1.1;
  color: var(--black);
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}
.hero-sub {
  font-size: 0.82rem;
  color: var(--mid);
  letter-spacing: 0.3px;
  font-weight: 400;
}

/* WATERMARK LOGO */
.logo-watermark {
  position: absolute;
  z-index: 1;
  top: 50%;
  right: -10px;
  transform: translateY(-50%);
  opacity: 0.04;
  filter: grayscale(100%) contrast(200%);
  height: 200px;
  width: auto;
  pointer-events: none;
}

/* QUOTE CARD */
.quote-section {
  background: var(--white);
  padding: 0 20px;
  margin-top: -1px;
}
.quote-card {
  background: var(--white);
  border: 1.5px solid var(--black);
  border-radius: 4px;
  padding: 24px 20px;
  margin-top: -20px;
  position: relative;
  z-index: 3;
}
.mission-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 22px;
  border: 1.5px solid var(--black);
  border-radius: 4px;
  overflow: hidden;
}
.mtab {
  flex: 1;
  padding: 10px 6px;
  border: none;
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  font-weight: 600;
  font-size: 0.78rem;
  text-align: center;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.15s;
  border-right: 1px solid var(--black);
}
.mtab:last-child { border-right: none; }
.mtab.active { background: var(--black); color: var(--white); }

/* FORM */
.field-group { margin-bottom: 16px; }
.field-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: block;
  margin-bottom: 6px;
}
.field-input {
  width: 100%;
  padding: 13px 14px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 0.95rem;
  outline: none;
  font-family: 'Inter', sans-serif;
  background: var(--white);
  color: var(--black);
  transition: border 0.15s;
}
.field-input:focus { border-color: var(--black); }
.field-input::placeholder { color: #ccc; font-size: 0.88rem; }
.form-row { display: flex; gap: 10px; }
.form-row .field-group { flex: 1; }

.btn-quote {
  width: 100%;
  padding: 16px;
  background: var(--black);
  color: var(--white);
  border: none;
  border-radius: 3px;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: opacity 0.15s;
  margin-top: 8px;
}
.btn-quote:hover { opacity: 0.85; }
.btn-quote:disabled { opacity: 0.4; cursor: not-allowed; }

/* LEG ROWS */
.leg-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
.leg-row input { flex: 1; min-width: 100px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 3px; font-size: 0.88rem; font-family: 'Inter', sans-serif; outline: none; background: var(--white); }
.leg-row input:focus { border-color: var(--black); }
.leg-num { font-weight: 700; color: var(--mid); min-width: 16px; font-size: 0.78rem; }
.btn-add-leg { padding: 8px 14px; border: 1px solid var(--black); border-radius: 3px; background: var(--white); color: var(--black); font-size: 0.72rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; font-family: 'Inter', sans-serif; margin: 8px 0 12px; }

/* TRUST BAR */
.trust-bar { display: flex; gap: 6px; padding: 16px 20px 4px; flex-wrap: wrap; justify-content: center; }
.trust-item { font-size: 0.7rem; font-weight: 600; color: var(--mid); letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 12px; border: 1px solid var(--border); border-radius: 2px; }

/* MAIN */
.main { max-width: 720px; margin: 0 auto; padding: 0 0 80px; }
.inner { padding: 0 20px; }

/* SECTION LABEL */
.section-label {
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 24px 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* RESULT CARDS */
.ac-card {
  background: var(--white);
  border: 1px solid var(--black);
  border-radius: 3px;
  padding: 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.ac-card-dot {
  position: absolute;
  top: -30px; right: -30px;
  width: 100px; height: 100px;
  background-image: radial-gradient(circle, #ddd 1px, transparent 1px);
  background-size: 8px 8px;
  opacity: 0.6;
  pointer-events: none;
}
.ac-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.ac-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--black);
}
.ac-badge {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border: 1px solid var(--black);
  border-radius: 2px;
  color: var(--black);
}

/* ROUTE TABLE */
.route-wrap { overflow-x: auto; margin-bottom: 14px; }
.route-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 380px; }
.route-table th { background: var(--black); color: var(--white); padding: 8px 10px; text-align: left; font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
.route-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: #333; }
.route-table tr:last-child td { border-bottom: none; }

/* TAGS */
.tag { display: inline-block; padding: 2px 7px; border-radius: 2px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid; }
.tag-rev { border-color: #155724; color: #155724; background: transparent; }
.tag-pos { border-color: #856404; color: #856404; background: transparent; }
.tag-dep { border-color: #721c24; color: #721c24; background: transparent; }
.tag-rep { border-color: #004085; color: #004085; background: transparent; }
.tag-idle { border-color: #e65100; color: #e65100; background: transparent; }
.tag-overnight { border-color: #4527a0; color: #4527a0; background: transparent; }

/* BILLING */
.billing { background: var(--grey); border-radius: 3px; padding: 14px 16px; }
.billing-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.82rem; border-bottom: 1px solid var(--border); color: #555; }
.billing-row:last-of-type { border-bottom: none; }
.billing-divider { height: 1px; background: var(--black); margin: 10px 0; }
.billing-total { display: flex; justify-content: space-between; font-weight: 800; font-size: 1rem; color: var(--black); padding-top: 4px; font-family: 'Playfair Display', serif; }

/* OPTION TABS */
.option-tabs { display: flex; gap: 0; margin-bottom: 12px; border: 1px solid var(--black); border-radius: 3px; overflow: hidden; }
.otab { flex: 1; padding: 8px 10px; border: none; background: var(--white); color: var(--mid); cursor: pointer; font-size: 0.72rem; font-weight: 700; text-align: center; letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Inter', sans-serif; border-right: 1px solid var(--black); }
.otab:last-child { border-right: none; }
.otab.active { background: var(--black); color: var(--white); }
.otab-content { display: none; }
.otab-content.active { display: block; }

/* BOXES */
.info-box { border-left: 2px solid var(--black); background: var(--grey); color: #555; padding: 10px 14px; margin: 10px 0; font-size: 0.8rem; line-height: 1.6; border-radius: 0 3px 3px 0; }
.error-card { border-left: 2px solid #cc0000; background: #fff8f8; color: #cc0000; padding: 14px 16px; margin: 14px 0; font-size: 0.85rem; line-height: 1.6; border-radius: 0 3px 3px 0; }
.pickup-drop-msg { border-left: 2px solid var(--black); background: var(--grey); color: #333; padding: 10px 14px; margin-bottom: 12px; font-size: 0.8rem; line-height: 1.6; border-radius: 0 3px 3px 0; }
.validity-notice { border: 1px solid var(--border); border-radius: 3px; padding: 10px 16px; margin-top: 8px; font-size: 0.72rem; color: var(--mid); text-align: center; letter-spacing: 0.3px; }
.resolving-bar { background: var(--grey); border-radius: 3px; padding: 10px 14px; margin-bottom: 10px; font-size: 0.8rem; color: var(--mid); display: none; letter-spacing: 0.3px; }

/* LOADING */
.loading-card { background: var(--white); border: 1px solid var(--border); border-radius: 3px; padding: 40px 20px; text-align: center; margin-bottom: 12px; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--black); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--mid); font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; }

/* CTA */
.cta-block { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; background: var(--black); color: var(--white); border: none; border-radius: 3px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; letter-spacing: 1.5px; text-transform: uppercase; transition: opacity 0.15s; }
.btn-whatsapp:hover { opacity: 0.85; }
.btn-call { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 13px; background: var(--white); color: var(--black); border: 1.5px solid var(--black); border-radius: 3px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.15s; }
.btn-call:hover { background: var(--black); color: var(--white); }
.btn-reset { padding: 11px; background: transparent; color: var(--mid); border: 1px solid var(--border); border-radius: 3px; font-size: 0.72rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 1px; text-transform: uppercase; }

/* FX */
.fx-widget { background: var(--white); border: 1px solid var(--border); border-radius: 3px; padding: 16px 18px; margin-top: 14px; }
.fx-title { font-size: 0.62rem; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
.fx-input-wrap { display: flex; align-items: center; gap: 8px; background: var(--grey); border: 1px solid var(--border); border-radius: 3px; padding: 10px 14px; margin-bottom: 12px; }
.fx-input-wrap span { font-weight: 700; color: var(--mid); font-size: 0.78rem; letter-spacing: 1px; }
.fx-input-wrap input { border: none; background: transparent; font-size: 1rem; font-weight: 700; flex: 1; outline: none; font-family: 'Playfair Display', serif; color: var(--black); }
.fx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.fx-item { background: var(--grey); border-radius: 3px; padding: 10px 12px; border: 1px solid var(--border); }
.fx-currency { font-size: 0.62rem; font-weight: 700; color: var(--mid); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.fx-amount { font-size: 0.9rem; font-weight: 700; color: var(--black); font-family: 'Playfair Display', serif; }
.fx-updated { font-size: 0.65rem; color: #ccc; text-align: right; margin-top: 8px; }
.drop-label { font-size: 0.62rem; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: 1.5px; margin: 10px 0 6px; }

/* FOOTER */
.footer { background: var(--black); color: #666; padding: 32px 20px; text-align: center; font-size: 0.75rem; line-height: 2; }
.footer-company { color: #aaa; font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 6px; }
.footer a { color: #555; text-decoration: none; }
.footer-powered { margin-top: 16px; padding-top: 16px; border-top: 1px solid #1a1a1a; font-size: 0.65rem; color: #444; letter-spacing: 0.5px; }
.footer-powered a { color: #555; }

@media(max-width:480px) {
  .hero-headline { font-size: 1.9rem; }
  .form-row { flex-direction: column; }
  .fx-grid { grid-template-columns: repeat(2, 1fr); }
  .quote-card { padding: 18px 16px; }
  .hero-content { padding: 24px 20px 28px; }
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="blob hero-blob-1"></div>
  <div class="blob hero-blob-2"></div>
  <div class="dot-grid hero-dot"></div>
  <div class="hatch hero-hatch"></div>
  <img class="logo-watermark" id="logo-watermark" src="" alt="">

  <div class="header">
    <div class="logo-pill">
      <img id="header-logo" src="" alt="">
      <span id="header-company">JETMAN GLOBAL</span>
    </div>
    <span class="header-tagline" id="header-tagline">Aircraft Management</span>
  </div>

  <div class="hero-content">
    <div class="hero-label">Private Charter</div>
    <h2 class="hero-headline">Where do you<br>want to fly?</h2>
    <p class="hero-sub" id="hero-sub">Instant quotes across East Africa</p>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div style="padding: 0 20px;">
    <div class="quote-card" id="quote-card">
      <div id="resolving-bar" class="resolving-bar">Resolving location...</div>
      <div class="mission-tabs">
        <div class="mtab active" onclick="showMission('one_way',this)">One Way</div>
        <div class="mtab" onclick="showMission('return',this)">Return</div>
        <div class="mtab" onclick="showMission('safari',this)">Safari</div>
      </div>

      <div id="m-one_way">
        <div class="field-group">
          <label class="field-label">From</label>
          <input type="text" class="field-input" id="ow-pickup" placeholder="City, airstrip or Maps link">
        </div>
        <div class="field-group">
          <label class="field-label">To</label>
          <input type="text" class="field-input" id="ow-dropoff" placeholder="City, airstrip or Maps link">
        </div>
        <button class="btn-quote" onclick="submitQuote('one_way')">Get Instant Quote</button>
      </div>

      <div id="m-return" style="display:none">
        <div class="form-row">
          <div class="field-group">
            <label class="field-label">From</label>
            <input type="text" class="field-input" id="rt-pickup" placeholder="City or airstrip">
          </div>
          <div class="field-group">
            <label class="field-label">To</label>
            <input type="text" class="field-input" id="rt-dropoff" placeholder="City or airstrip">
          </div>
        </div>
        <div class="form-row">
          <div class="field-group">
            <label class="field-label">Departure</label>
            <input type="text" class="field-input" id="rt-depart" placeholder="25 Jun 2026">
          </div>
          <div class="field-group">
            <label class="field-label">Return</label>
            <input type="text" class="field-input" id="rt-return" placeholder="28 Jun 2026">
          </div>
        </div>
        <button class="btn-quote" onclick="submitQuote('return')">Get Instant Quote</button>
      </div>

      <div id="m-safari" style="display:none">
        <div id="safari-legs">
          <div class="leg-row">
            <span class="leg-num">1</span>
            <input type="text" placeholder="From" class="leg-origin">
            <input type="text" placeholder="To" class="leg-dest">
            <input type="text" placeholder="Date" class="leg-date" style="max-width:100px">
          </div>
        </div>
        <button class="btn-add-leg" onclick="addLeg()">+ Add Leg</button>
        <button class="btn-quote" onclick="submitQuote('safari')">Get Instant Quote</button>
      </div>
    </div>
  </div>

  <div class="trust-bar" id="trust-bar"></div>

  <div class="inner">
    <div id="loading" style="display:none;margin-top:20px">
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Calculating</div>
      </div>
    </div>

    <div id="error-box" style="display:none;margin-top:16px"></div>

    <div id="results" style="display:none;margin-top:4px">
      <div class="section-label">Your Quote</div>
      <div id="results-inner"></div>
      <div class="validity-notice" id="validity-notice"></div>

      <div class="fx-widget" id="fx-widget" style="display:none">
        <div class="fx-title">Live Currency Conversion</div>
        <div class="fx-input-wrap">
          <span>USD</span>
          <input type="number" id="fx-input" value="0" oninput="updateFX()">
        </div>
        <div class="fx-grid" id="fx-grid"></div>
        <div class="fx-updated" id="fx-updated"></div>
      </div>

      <div class="cta-block">
        <a id="btn-whatsapp" class="btn-whatsapp" href="#" target="_blank">

<script>
// Quotecloud Jetman Client v2.5.0
let config = {};
let fxRates = {};
let lastResults = [];
let GAPI_KEY = '';

async function init() {
  try {
    let r = await fetch('/settings/config/public');
    config = await r.json();
    let kr = await fetch('/get_maps_key');
    let kd = await kr.json();
    GAPI_KEY = kd.key || '';
    applyBranding();
    loadFX();
  } catch(e) { console.error('Init failed:', e); }
}

function applyBranding() {
  let c = config.contact || {};
  document.getElementById('page-title').textContent = (config.company_name||'Jetman Global') + ' — Instant Quotes';

  let logo = document.getElementById('header-logo');
  let watermark = document.getElementById('logo-watermark');
  if (config.logo_url) {
    logo.src = config.logo_url;
    watermark.src = config.logo_url;
  } else {
    logo.style.display = 'none';
    watermark.style.display = 'none';
  }

  document.getElementById('header-company').textContent = (config.company_name||'JETMAN GLOBAL').toUpperCase();
  document.getElementById('header-tagline').textContent = config.tagline || 'Aircraft Management';
  let region = (config.geo_lock||{}).region_name || 'East Africa';
  document.getElementById('hero-sub').textContent = `Instant quotes across ${region}`;

  let tb = (config.trust_bar||[]).filter(Boolean);
  let tbEl = document.getElementById('trust-bar');
  if (tb.length) tbEl.innerHTML = tb.map(item=>`<div class="trust-item">${item}</div>`).join('');
  else tbEl.style.display = 'none';

  let wa = c.whatsapp || '';
  let phone = c.phone || '';
  let greeting = c.whatsapp_greeting || "Hi, I'd like to enquire about a charter flight.";
  if (wa) document.getElementById('btn-whatsapp').href = `https://wa.me/${wa}?text=${encodeURIComponent(greeting)}`;
  else document.getElementById('btn-whatsapp').style.display = 'none';
  if (phone) document.getElementById('btn-call').href = `tel:${phone}`;
  else document.getElementById('btn-call').style.display = 'none';

  document.getElementById('footer-company').textContent = config.company_name || 'Jetman Global';
  let parts = [c.address, c.email, c.phone].filter(Boolean);
  document.getElementById('footer-contact').innerHTML = parts.join(' &nbsp;·&nbsp; ');
  if (config.footer_tagline) {
    let ft = document.createElement('div');
    ft.style.cssText = 'margin-top:6px;color:#444;font-size:0.72rem;letter-spacing:0.5px';
    ft.textContent = config.footer_tagline;
    document.getElementById('site-footer').insertBefore(ft, document.querySelector('.footer-powered'));
  }
}

async function loadFX() {
  try {
    let r = await fetch('/fx/rates');
    let data = await r.json();
    if (data.success) {
      fxRates = data.rates;
      if (data.updated) document.getElementById('fx-updated').textContent = 'Rates: ' + new Date(data.updated).toLocaleDateString();
    }
  } catch(e) {}
}

function updateFX() {
  let usd = parseFloat(document.getElementById('fx-input').value)||0;
  let currencies = ['KES','EUR','GBP','TZS','UGX'];
  document.getElementById('fx-grid').innerHTML = currencies.map(c=>{
    let rate = fxRates[c]||0;
    let amount = usd*rate;
    let fmt = amount>=1000 ? amount.toLocaleString(undefined,{maximumFractionDigits:0}) : amount.toLocaleString(undefined,{maximumFractionDigits:2});
    return `<div class="fx-item"><div class="fx-currency">${c}</div><div class="fx-amount">${fmt}</div></div>`;
  }).join('');
}

function isMapsUrl(s) {
  return s && (s.includes('maps.app.goo.gl')||s.includes('goo.gl')||s.includes('google.com/maps')||s.includes('maps.google'));
}

function extractCoordsFromUrl(url) {
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  let m2 = url.match(/!3d(-?\d+\.\d+).*?!4d(-?\d+\.\d+)/);
  if (m2) return { lat: parseFloat(m2[1]), lng: parseFloat(m2[2]) };
  let m3 = url.match(/[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m3) return { lat: parseFloat(m3[1]), lng: parseFloat(m3[2]) };
  return null;
}

async function reverseGeocode(lat, lng) {
  if (!GAPI_KEY) return `${lat},${lng}`;
  try {
    let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GAPI_KEY}&region=ke`);
    let data = await r.json();
    if (data.status==='OK') {
      let components = data.results[0].address_components;
      let locality = components.find(c=>c.types.includes('locality'));
      let admin = components.find(c=>c.types.includes('administrative_area_level_1'));
      if (locality&&admin) return `Pin, ${locality.long_name}, ${admin.long_name}`;
      if (locality) return `Pin, ${locality.long_name}`;
      let addr = data.results[0].formatted_address;
      if (addr&&!addr.includes('+')) return `Pin, ${addr}`;
    }
  } catch(e) {}
  return `Pin, ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}

async function resolveMapsShortUrl(url) {
  try {
    let urlObj = new URL(url);
    let q = urlObj.searchParams.get('q')||urlObj.searchParams.get('query')||'';
    if (!q) {
      let pathMatch = url.match(/place\/([^\/\?@]+)/);
      if (pathMatch) q = decodeURIComponent(pathMatch[1].replace(/\+/g,' '));
    }
    if (q&&GAPI_KEY) {
      let region = (config.geo_lock||{}).region_name||'Kenya';
      let query = q.toLowerCase().includes(region.toLowerCase()) ? q : `${q} ${region}`;
      let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${GAPI_KEY}&region=ke`);
      let data = await r.json();
      if (data.status==='OK') {
        let loc = data.results[0].geometry.location;
        let display = await reverseGeocode(loc.lat, loc.lng);
        return { coords: `${loc.lat},${loc.lng}`, display };
      }
    }
  } catch(e) {}
  return null;
}

async function resolveLocationClientSide(input) {
  if (!input||!input.trim()) return null;
  let s = input.trim();
  if (isMapsUrl(s)) {
    let coords = extractCoordsFromUrl(s);
    if (coords) {
      let display = await reverseGeocode(coords.lat, coords.lng);
      return { resolved: `${coords.lat},${coords.lng}`, display };
    }
    let resolved = await resolveMapsShortUrl(s);
    if (resolved) return { resolved: resolved.coords, display: resolved.display };
    return null;
  }
  return { resolved: s, display: s };
}

function showMission(m, el) {
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['one_way','return','safari'].forEach(id=>{
    document.getElementById('m-'+id).style.display = id===m?'block':'none';
  });
}

function parseSmartDate(s) {
  s = s.trim().replace(/(\d+)(st|nd|rd|th)/gi,'$1');
  const fmts = [
    { r:/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/, fn:m=>{ let y=m[3].length===2?'20'+m[3]:m[3]; return new Date(`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`); }},
    { r:/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/, fn:m=>new Date(`${m[2]} ${m[1]} ${m[3]}`) },
    { r:/^([A-Za-z]+)\s+(\d{1,2})\s+(\d{4})$/, fn:m=>new Date(`${m[1]} ${m[2]} ${m[3]}`) },
  ];
  for (let f of fmts) {
    let m = s.match(f.r);
    if (m) {
      let d = f.fn(m);
      if (!isNaN(d)) {
        let dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0'), yy=String(d.getFullYear()).slice(-2);
        return `${dd}/${mm}/${yy}`;
      }
    }
  }
  return s;
}

function addLeg() {
  let n = document.querySelectorAll('#safari-legs .leg-row').length + 1;
  let div = document.createElement('div');
  div.className = 'leg-row';
  div.innerHTML = `<span class="leg-num">${n}</span>
    <input type="text" placeholder="From" class="leg-origin">
    <input type="text" placeholder="To" class="leg-dest">
    <input type="text" placeholder="Date" class="leg-date" style="max-width:100px">
    <button onclick="this.parentElement.remove()" style="padding:5px 9px;border:1px solid #ccc;background:#fff;color:#999;border-radius:2px;cursor:pointer;font-size:0.8rem">x</button>`;
  document.getElementById('safari-legs').appendChild(div);
}

function showResolving(show) {
  document.getElementById('resolving-bar').style.display = show ? 'block' : 'none';
}

async function submitQuote(mission) {
  let body = { mission };
  showLoading(true, 'Calculating');
  hideError();
  document.getElementById('results').style.display = 'none';
  try {
    if (mission==='one_way') {
      let rawP = document.getElementById('ow-pickup').value.trim();
      let rawD = document.getElementById('ow-dropoff').value.trim();
      if (!rawP||!rawD) { showLoading(false); return showError('Please enter both From and To locations.'); }
      showResolving(true);
      let p = await resolveLocationClientSide(rawP);
      let d = await resolveLocationClientSide(rawD);
      showResolving(false);
      body.pickup = (p&&isMapsUrl(rawP)) ? p.resolved : rawP;
      body.dropoff = (d&&isMapsUrl(rawD)) ? d.resolved : rawD;
    } else if (mission==='return') {
      let rawP = document.getElementById('rt-pickup').value.trim();
      let rawD = document.getElementById('rt-dropoff').value.trim();
      if (!rawP||!rawD) { showLoading(false); return showError('Please enter both From and To locations.'); }
      showResolving(true);
      let p = await resolveLocationClientSide(rawP);
      let d = await resolveLocationClientSide(rawD);
      showResolving(false);
      body.pickup = (p&&isMapsUrl(rawP)) ? p.resolved : rawP;
      body.dropoff = (d&&isMapsUrl(rawD)) ? d.resolved : rawD;
      body.depart = parseSmartDate(document.getElementById('rt-depart').value);
      body.return_date = parseSmartDate(document.getElementById('rt-return').value);
      if (!body.depart||!body.return_date) { showLoading(false); return showError('Please enter departure and return dates.'); }
    } else {
      body.legs = [];
      let rows = document.querySelectorAll('#safari-legs .leg-row');
      showResolving(true);
      for (let row of rows) {
        let rawO = row.querySelector('.leg-origin').value.trim();
        let rawD2 = row.querySelector('.leg-dest').value.trim();
        let dt = parseSmartDate(row.querySelector('.leg-date').value);
        if (rawO&&rawD2) {
          let o = await resolveLocationClientSide(rawO);
          let d2 = await resolveLocationClientSide(rawD2);
          body.legs.push({ origin:(o&&isMapsUrl(rawO))?o.resolved:rawO, destination:(d2&&isMapsUrl(rawD2))?d2.resolved:rawD2, date:dt });
        }
      }
      showResolving(false);
      if (!body.legs.length) { showLoading(false); return showError('Please add at least one leg.'); }
    }
    let r = await fetch('/quote/calculate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    let data = await r.json();
    showLoading(false);
    if (!r.ok) { showError(data.error||'Unable to calculate. Please try again.'); return; }
    lastResults = data.results||[];
    renderResults(lastResults, mission);
  } catch(e) {
    showLoading(false); showResolving(false);
    showError('Network error. Please check your connection and try again.');
  }
}

function showLoading(show, text) {
  document.getElementById('loading').style.display = show?'block':'none';
  if (text) document.getElementById('loading-text').textContent = text;
}

function showError(msg) {
  let el = document.getElementById('error-box');
  el.innerHTML = `<div class="error-card">${msg}</div>`;
  el.style.display = 'block';
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

function hideError() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('error-box').innerHTML = '';
}

function tagClass(t, note) {
  if (note) return note.toLowerCase().includes('idle')?'tag-idle':'tag-overnight';
  return t==='revenue'?'tag-rev':t==='positioning'?'tag-pos':t==='depositioning'?'tag-dep':'tag-rep';
}

function renderSegments(segs, showDist) {
  if (!segs||!segs.length) return '';
  let rows = segs.map(s=>{
    let isNote = s.note&&!s.type;
    if (isNote) {
      let label = s.note.toLowerCase().includes('idle')?'Idle Day':'Overnight';
      let cost = s.cost?`$${parseFloat(s.cost).toLocaleString(undefined,{minimumFractionDigits:2})}`:'—';
      return `<tr><td><span class="tag ${tagClass(null,s.note)}">${label}</span></td><td colspan="2" style="color:#888;font-size:0.75rem">${s.note}</td>${showDist?'<td>—</td>':''}<td style="font-weight:700">${cost}</td><td>—</td></tr>`;
    }
    let nm = s.nm||s.dist_nm||0;
    return `<tr><td><span class="tag ${tagClass(s.type,null)}">${s.type}</span></td><td>${s.origin||''}</td><td>${s.destination||''}</td>${showDist?`<td>${nm?nm+' nm':'—'}</td>`:''}<td>${s.hours?s.hours+' hr':'—'}</td><td>${s.date||'—'}</td></tr>`;
  }).join('');
  let dh = showDist?'<th>Dist</th>':'';
  return `<div class="route-wrap"><table class="route-table"><thead><tr><th>Type</th><th>From</th><th>To</th>${dh}<th>Hours</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function calcHours(segs) {
  let t=0; (segs||[]).forEach(s=>{if(s.hours&&s.type)t+=parseFloat(s.hours);}); return Math.round(t*10)/10;
}

function renderBilling(res) {
  let rate=res.rate_usd||0, hrs=calcHours(res.segments||[]), rows='';
  if (hrs>0&&rate>0) {
    let fc=Math.round(hrs*rate*100)/100;
    rows+=`<div class="billing-row"><span>Aircraft Charter <span style="color:#aaa;font-size:0.75rem">${hrs}hrs @ $${rate.toLocaleString()}/hr</span></span><span>$${fc.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  let fee=res.pax_fee_usd||res.pax_fee_usd_display||0;
  if (fee>0) rows+=`<div class="billing-row"><span>Taxes & Admin</span><span>$${parseFloat(fee).toLocaleString()}</span></div>`;
  let ov=res.overnight_usd||res.overnight_cost_usd||0, oRate=res.overnight_rate_usd||0;
  if (ov>0&&oRate>0) {
    let n=Math.round(ov/oRate);
    rows+=`<div class="billing-row"><span>Overnight Per Diem <span style="color:#aaa;font-size:0.75rem">${n} night${n!==1?'s':''} @ $${oRate}</span></span><span>$${parseFloat(ov).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  let wu=res.waiting_usd||res.idle_cost_usd||0, ir=res.idle_day_rate_usd||0;
  if (wu>0) {
    let days=ir>0?Math.round(wu/ir):1;
    rows+=`<div class="billing-row"><span>Idle Day <span style="color:#aaa;font-size:0.75rem">${days} day${days!==1?'s':''} @ $${ir.toLocaleString()}</span></span><span>$${parseFloat(wu).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  return `<div class="billing">${rows}<div class="billing-divider"></div><div class="billing-total"><span>Total Estimate</span><span>USD $${(res.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div></div>`;
}

function renderOneAc(res, showDist) {
  if (res.error) return `<div class="error-card">${res.error}</div>`;
  let badge = res.ac_type==='fixed_wing'?`<span class="ac-badge">Fixed Wing</span>`:`<span class="ac-badge">Helicopter</span>`;
  let disclaimer = res.ac_type==='fixed_wing'?`<div class="info-box">${config.landing_field_disclaimer||'Fixed wing aircraft. Runway required. Quote is not confirmation of service. Contact us to confirm runway suitability.'}</div>`:'';
  let content='';
  if (res.mission==='return_both') {
    let wd=res.wait_days, maxN=res.max_nights||3;
    if (wd>=maxN) {
      let b=res.option_b;
      let bRes={segments:[...(b.drop.segments||[]),...(b.pick.segments||[])],rate_usd:res.rate_usd,overnight_rate_usd:res.overnight_rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display,total_usd:b.total_usd};
      content=`<div class="pickup-drop-msg">${res.pickup_drop_msg||'Pick & Drop applies for this duration.'}</div><div class="drop-label">Drop Off</div>${renderSegments(b.drop.segments,showDist)}<div class="drop-label">Pick Up</div>${renderSegments(b.pick.segments,showDist)}${renderBilling(bRes)}`;
    } else {
      let aRes={...res.option_a,rate_usd:res.rate_usd,overnight_rate_usd:res.overnight_rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display};
      let bRes2={segments:[...(res.option_b.drop.segments||[]),...(res.option_b.pick.segments||[])],rate_usd:res.rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display,total_usd:res.option_b.total_usd};
      content=`<div class="info-box">Aircraft availability for the wait option is subject to schedule. Please review both options.</div><div class="option-tabs"><div class="otab active" onclick="switchOtab(this,'oa-${res.ac_key}')">Option A — Waits</div><div class="otab" onclick="switchOtab(this,'ob-${res.ac_key}')">Option B — Pick & Drop</div></div><div class="otab-content active" id="oa-${res.ac_key}">${renderSegments(res.option_a.segments,showDist)}${renderBilling(aRes)}</div><div class="otab-content" id="ob-${res.ac_key}"><div class="drop-label">Drop Off</div>${renderSegments(res.option_b.drop.segments,showDist)}<div class="drop-label">Pick Up</div>${renderSegments(res.option_b.pick.segments,showDist)}${renderBilling(bRes2)}</div>`;
    }
  } else {
    content = renderSegments(res.segments,showDist)+renderBilling(res);
  }
  return `<div class="ac-card-dot"></div><div class="ac-header"><div class="ac-title">${res.ac_label||''}</div>${badge}</div>${content}${disclaimer}`;
}

function switchOtab(el, id) {
  let parent=el.closest('.ac-card');
  parent.querySelectorAll('.otab').forEach(t=>t.classList.remove('active'));
  parent.querySelectorAll('.otab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function renderResults(results, mission) {
  let showDist=(config.quoting_rules||{}).show_distance_to_client||false;
  document.getElementById('results-inner').innerHTML = results.map(res=>`<div class="ac-card">${renderOneAc(res,showDist)}</div>`).join('');
  let hours=(config.quoting_rules||{}).quote_validity_hours||48;
  document.getElementById('validity-notice').textContent=`Quote valid for ${hours} hours. Subject to availability and change.`;
  let firstTotal=0;
  if (results.length) { let f=results[0]; firstTotal=f.mission==='return_both'?(f.option_a?.total_usd||0):(f.total_usd||0); }
  if (firstTotal>0&&Object.keys(fxRates).length) {
    document.getElementById('fx-input').value=firstTotal;
    document.getElementById('fx-widget').style.display='block';
    updateFX();
  }
  buildWhatsApp(results, mission);
  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function buildWhatsApp(results, mission) {
  let wa=(config.contact||{}).whatsapp||'';
  if (!wa) return;
  let greeting=(config.contact||{}).whatsapp_greeting||"Hi, I'd like to enquire about a charter quote.";
  let lines=[greeting,''];
  results.forEach(res=>{
    if (res.error) return;
    lines.push(`*${res.ac_label}*`);
    if (res.mission==='return_both') {
      let wd=res.wait_days, maxN=res.max_nights||3;
      if (wd>=maxN) {
        let b=res.option_b;
        lines.push(`Pick & Drop — USD $${(b.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        (b.drop?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`Drop: ${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
        (b.pick?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`Pick: ${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
      } else {
        lines.push(`Option A (Waits) — USD $${(res.option_a?.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        lines.push(`Option B (Pick & Drop) — USD $${(res.option_b?.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        (res.option_a?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
      }
    } else {
      lines.push(`USD $${(res.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
      (res.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
    }
    lines.push('');
  });
  lines.push('Please confirm availability and next steps.');
  document.getElementById('btn-whatsapp').href=`https://wa.me/${wa}?text=${encodeURIComponent(lines.join('\n'))}`;
}

function resetQuote() {
  document.getElementById('results').style.display='none';
  hideError(); lastResults=[];
  ['ow-pickup','ow-dropoff','rt-pickup','rt-dropoff','rt-depart','rt-return'].forEach(id=>{
    let el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('quote-card').scrollIntoView({behavior:'smooth',block:'start'});
}

init();
</script>
