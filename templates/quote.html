<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Charter Quotes</title>
<style>body{visibility:hidden}</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #ffffff;
  --grey-50: #fafafa;
  --grey-100: #f5f5f5;
  --grey-200: #e8e8e8;
  --grey-300: #d0d0d0;
  --grey-500: #888;
  --grey-700: #444;
  --accent: #0a0a0a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--white); color: var(--black); min-height: 100vh; }
.hero { background: var(--black); color: var(--white); position: relative; overflow: hidden; padding-bottom: 72px; }
.hero::before { content: ''; position: absolute; top: -120px; right: -80px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); pointer-events: none; }
.hero::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 48px; background: var(--white); border-radius: 48px 48px 0 0; }
.hero-grain { position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; opacity: 0.3; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 24px 28px 32px; position: relative; z-index: 2; border-bottom: 1px solid rgba(255,255,255,0.07); }
.logo-wrap { display: flex; align-items: center; gap: 14px; }
.logo-wrap img { height: 26px; filter: invert(1); object-fit: contain; }
.header-label { font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
.header-pill { font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); padding: 5px 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; }
.hero-text { position: relative; z-index: 2; padding: 36px 28px 0; }
.hero-eyebrow { font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.hero-eyebrow::before { content: ''; display: inline-block; width: 20px; height: 1px; background: rgba(255,255,255,0.3); }
.hero-h { font-size: clamp(2.2rem, 7vw, 3.8rem); font-weight: 300; line-height: 1.1; letter-spacing: -1px; margin-bottom: 12px; font-style: italic; color: var(--white); }
.hero-h strong { font-style: normal; font-weight: 600; }
.hero-sub { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: rgba(255,255,255,0.4); font-weight: 300; letter-spacing: 0.3px; }
.main { max-width: 700px; margin: 0 auto; }
.card-wrap { padding: 0 18px; margin-top: -44px; position: relative; z-index: 10; }
.quote-card { background: var(--white); border: 1px solid var(--grey-200); border-radius: 3px; box-shadow: 0 12px 48px rgba(0,0,0,0.14); overflow: hidden; }
.mission-tabs { display: flex; border-bottom: 1px solid var(--grey-200); }
.mtab { flex: 1; padding: 14px 8px; border: none; border-bottom: 2px solid transparent; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--grey-500); cursor: pointer; transition: all 0.2s; margin-bottom: -1px; }
.mtab.active { color: var(--black); border-bottom-color: var(--black); }
.mtab:hover { color: var(--grey-700); background: var(--grey-50); }
.form-body { padding: 24px 22px 20px; }
.field-group { margin-bottom: 16px; }
.field-label { font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--grey-500); display: block; margin-bottom: 7px; }
.field-input { width: 100%; padding: 12px 14px; border: 1px solid var(--grey-200); border-radius: 2px; font-size: 1rem; font-family: 'Cormorant Garamond', serif; background: var(--grey-50); color: var(--black); transition: all 0.2s; outline: none; }
.field-input:focus { border-color: var(--black); background: var(--white); box-shadow: 0 0 0 3px rgba(10,10,10,0.06); }
.field-input::placeholder { color: #c0c0c0; font-size: 0.88rem; font-family: 'DM Sans', sans-serif; font-weight: 300; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.swap-row { display: flex; align-items: center; gap: 8px; margin: -6px 0 10px; }
.swap-line { flex: 1; height: 1px; background: var(--grey-200); }
.swap-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--grey-200); background: var(--white); color: var(--grey-500); cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.swap-btn:hover { border-color: var(--black); color: var(--black); }
.resolving-bar { display: none; align-items: center; gap: 10px; padding: 10px 14px; background: var(--grey-50); border: 1px solid var(--grey-200); border-radius: 2px; margin-bottom: 14px; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--grey-700); font-weight: 400; }
.resolving-bar.active { display: flex; }
.spin { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--grey-300); border-top-color: var(--black); animation: spin 0.7s linear infinite; flex-shrink: 0; }
.btn-quote { width: 100%; padding: 14px; background: var(--black); color: var(--white); border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-quote:hover:not(:disabled) { opacity: 0.82; }
.btn-quote:disabled { opacity: 0.5; cursor: not-allowed; }
.leg-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.leg-row input { flex: 1; min-width: 100px; padding: 10px 12px; border: 1px solid var(--grey-200); border-radius: 2px; font-size: 0.9rem; font-family: 'Cormorant Garamond', serif; outline: none; background: var(--grey-50); color: var(--black); transition: border-color 0.2s; }
.leg-row input:focus { border-color: var(--black); background: var(--white); }
.leg-row input::placeholder { color: #c0c0c0; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; }
.leg-num { font-family: 'DM Sans', sans-serif; font-weight: 600; color: var(--grey-500); min-width: 16px; font-size: 0.78rem; }
.btn-add-leg { padding: 9px 16px; border-radius: 2px; border: 1px solid var(--grey-300); color: var(--grey-700); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin: 4px 0 14px; letter-spacing: 0.5px; }
.btn-add-leg:hover { border-color: var(--black); color: var(--black); }
.trust-bar { display: flex; gap: 0; padding: 18px 18px 6px; flex-wrap: wrap; justify-content: center; border-top: 1px solid var(--grey-100); }
.trust-item { font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 600; color: var(--grey-500); letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; padding: 5px 14px; border-right: 1px solid var(--grey-200); }
.trust-item:last-child { border-right: none; }
.trust-dot { width: 3px; height: 3px; background: var(--black); border-radius: 50%; flex-shrink: 0; }
.inner { padding: 0 18px 80px; }
.section-label { font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 600; color: var(--grey-500); text-transform: uppercase; letter-spacing: 2.5px; margin: 24px 0 14px; display: flex; align-items: center; gap: 12px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--grey-200); }
.loading-card { background: var(--white); border: 1px solid var(--grey-200); border-radius: 3px; padding: 40px 20px; text-align: center; margin: 16px 0; }
.loading-text { font-family: 'DM Sans', sans-serif; color: var(--grey-500); font-size: 0.68rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 14px; }
.spinner-lg { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--grey-200); border-top-color: var(--black); border-radius: 50%; animation: spin 0.7s linear infinite; }
.ac-card { background: var(--white); border: 1px solid var(--grey-200); border-radius: 3px; margin-bottom: 14px; overflow: hidden; animation: fadeUp 0.35s ease forwards; }
.ac-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--grey-200); }
.ac-header.dark { background: var(--black); color: var(--white); }
.ac-header.light { background: var(--white); color: var(--black); }
.ac-title { font-size: 1rem; font-weight: 600; letter-spacing: -0.3px; }
.ac-sub { font-family: 'DM Sans', sans-serif; font-size: 0.65rem; opacity: 0.5; margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }
.ac-badge { font-family: 'DM Sans', sans-serif; padding: 3px 10px; border-radius: 2px; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.badge-heli { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.badge-heli-light { background: var(--grey-100); color: var(--grey-700); }
.badge-fixed { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.badge-fixed-light { background: #fce7f3; color: #9d174d; }
.route-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.route-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 360px; }
.route-table th { background: var(--grey-50); color: var(--grey-500); padding: 9px 16px; text-align: left; font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid var(--grey-200); }
.route-table td { padding: 10px 16px; border-bottom: 1px solid var(--grey-100); color: var(--grey-700); }
.route-table tr:last-child td { border-bottom: none; }
.route-table tr:hover td { background: var(--grey-50); }
.tag { display: inline-block; padding: 2px 7px; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
.tag-rev { background: var(--black); color: var(--white); }
.tag-pos { background: var(--grey-100); color: var(--grey-700); }
.tag-dep { background: var(--grey-100); color: var(--grey-700); }
.tag-rep { background: var(--grey-200); color: var(--grey-700); }
.tag-idle { background: #fff3e0; color: #9a3412; }
.tag-overnight { background: #f3e8ff; color: #6b21a8; }
.billing { background: var(--grey-50); padding: 14px 18px; border-top: 1px solid var(--grey-200); }
.billing-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--grey-100); color: var(--grey-700); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; }
.billing-row:last-of-type { border-bottom: none; }
.billing-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; color: var(--black); border-top: 1px solid var(--grey-300); margin-top: 8px; padding-top: 10px; font-family: 'Cormorant Garamond', serif; letter-spacing: -0.3px; }
.option-tabs { display: flex; border-bottom: 1px solid var(--grey-200); }
.otab { flex: 1; padding: 10px 8px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--grey-500); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; text-align: center; margin-bottom: -1px; }
.otab.active { color: var(--black); border-bottom-color: var(--black); background: var(--grey-50); }
.otab-content { display: none; }
.otab-content.active { display: block; }
.info-box { background: var(--grey-50); border-left: 2px solid var(--black); padding: 10px 14px; margin: 10px 0; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; line-height: 1.6; color: var(--grey-700); }
.error-card { background: #fff1f2; border-left: 2px solid #e11d48; color: #be123c; padding: 14px 16px; margin: 14px 0; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; line-height: 1.6; }
.pickup-drop-msg { background: var(--grey-50); border-left: 2px solid var(--black); padding: 10px 14px; margin-bottom: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; line-height: 1.6; color: var(--grey-700); }
.validity-notice { background: var(--white); border: 1px solid var(--grey-200); border-radius: 2px; padding: 10px 16px; margin-top: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.68rem; color: var(--grey-500); text-align: center; letter-spacing: 0.3px; }
.drop-label { font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 600; color: var(--grey-500); text-transform: uppercase; letter-spacing: 2px; margin: 10px 0 6px; }
.cta-block { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; background: #25D366; color: var(--white); border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s; letter-spacing: 0.5px; }
.btn-whatsapp:hover { background: #1da851; }
.btn-call { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 13px; background: var(--white); color: var(--black); border: 1px solid var(--black); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; letter-spacing: 0.5px; }
.btn-call:hover { background: var(--black); color: var(--white); }
.btn-reset { padding: 11px; background: transparent; color: var(--grey-500); border: 1px solid var(--grey-200); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
.btn-reset:hover { border-color: var(--black); color: var(--black); }
.fx-widget { background: var(--white); border: 1px solid var(--grey-200); border-radius: 3px; padding: 16px 18px; margin-top: 14px; }
.fx-title { font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 600; color: var(--grey-500); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
.fx-input-wrap { display: flex; align-items: center; gap: 8px; background: var(--grey-50); border: 1px solid var(--grey-200); border-radius: 2px; padding: 10px 14px; margin-bottom: 12px; }
.fx-input-wrap span { font-family: 'DM Sans', sans-serif; font-weight: 700; color: var(--black); font-size: 0.75rem; letter-spacing: 1px; }
.fx-input-wrap input { border: none; background: transparent; font-size: 1rem; font-weight: 600; flex: 1; outline: none; font-family: 'Cormorant Garamond', serif; color: var(--black); }
.fx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.fx-item { background: var(--grey-50); border-radius: 2px; padding: 10px 12px; border: 1px solid var(--grey-200); }
.fx-currency { font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 700; color: var(--grey-500); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.fx-amount { font-size: 0.95rem; font-weight: 600; color: var(--black); }
.fx-updated { font-family: 'DM Sans', sans-serif; font-size: 0.6rem; color: var(--grey-300); text-align: right; margin-top: 8px; }
.fx-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--grey-200); }
.fx-row:last-child { border-bottom: none; }
.fx-row-label { font-family: 'DM Sans', sans-serif; color: var(--grey-500); font-size: 0.78rem; }
.fx-row-amount { font-family: 'DM Sans', sans-serif; font-weight: 700; color: var(--black); font-size: 0.92rem; }
.footer { background: var(--black); color: rgba(255,255,255,0.3); padding: 40px 22px; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; line-height: 2; }
.footer img { height: 18px; filter: invert(1); opacity: 0.4; display: block; margin: 0 auto 16px; }
.footer-powered { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.15); }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@media(max-width:480px) {
  .hero-h { font-size: 2rem; }
  .form-row-2 { grid-template-columns: 1fr; }
  .fx-grid { grid-template-columns: repeat(2, 1fr); }
  .card-wrap { padding: 0 14px; }
  .inner { padding: 0 14px 80px; }
  .trust-item { padding: 5px 10px; font-size: 0.55rem; }
  .form-body { padding: 20px 16px 18px; }
  .ac-header { flex-direction: column; align-items: flex-start; gap: 8px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-grain"></div>
  <div class="header">
    <div class="logo-wrap">
      <img id="header-logo" src="" alt="">
      <div style="width:1px;height:18px;background:rgba(255,255,255,0.15)"></div>
      <div class="header-label" id="header-tagline">Private Aviation</div>
    </div>
    <div class="header-pill" id="header-region">Kenya</div>
  </div>
  <div class="hero-text">
    <div class="hero-eyebrow">Instant Charter Quote</div>
    <h2 class="hero-h">Where shall we<br><strong>take you?</strong></h2>
    <p class="hero-sub" id="hero-sub">East Africa's premier charter aviation</p>
  </div>
</div>

<div class="main">
  <div class="card-wrap">
    <div class="quote-card">
      <div id="resolving-bar" class="resolving-bar">
        <span class="spin"></span>
        <span>Resolving location from Maps link...</span>
      </div>
      <div class="mission-tabs">
        <div class="mtab active" onclick="showMission('one_way',this)">One Way</div>
        <div class="mtab" onclick="showMission('return',this)">Return</div>
        <div class="mtab" onclick="showMission('safari',this)">Safari</div>
      </div>
      <div id="m-one_way" class="form-body">
        <div class="field-group">
          <label class="field-label">From</label>
          <input type="text" class="field-input" id="ow-pickup" placeholder="Name of place or Google Maps pin">
        </div>
        <div class="swap-row">
          <div class="swap-line"></div>
          <button class="swap-btn" onclick="swapLocations()" title="Swap">⇅</button>
          <div class="swap-line"></div>
        </div>
        <div class="field-group">
          <label class="field-label">To</label>
          <input type="text" class="field-input" id="ow-dropoff" placeholder="Name of place or Google Maps pin">
        </div>
        <button class="btn-quote" onclick="submitQuote('one_way')">Get Instant Quote</button>
      </div>
      <div id="m-return" style="display:none" class="form-body">
        <div class="field-group">
          <label class="field-label">From</label>
          <input type="text" class="field-input" id="rt-pickup" placeholder="Name of place or Google Maps pin">
        </div>
        <div class="field-group">
          <label class="field-label">To</label>
          <input type="text" class="field-input" id="rt-dropoff" placeholder="Name of place or Google Maps pin">
        </div>
        <div class="form-row-2" style="margin-bottom:16px">
          <div class="field-group" style="margin-bottom:0">
            <label class="field-label">Departure</label>
            <input type="text" class="field-input" id="rt-depart" placeholder="25 Jun 2026">
          </div>
          <div class="field-group" style="margin-bottom:0">
            <label class="field-label">Return</label>
            <input type="text" class="field-input" id="rt-return" placeholder="28 Jun 2026">
          </div>
        </div>
        <button class="btn-quote" onclick="submitQuote('return')">Get Instant Quote</button>
      </div>
      <div id="m-safari" style="display:none" class="form-body">
        <div id="safari-legs">
          <div class="leg-row">
            <span class="leg-num">1</span>
            <input type="text" placeholder="Name of place or Google Maps pin" class="leg-origin">
            <input type="text" placeholder="Name of place or Google Maps pin" class="leg-dest">
            <input type="text" placeholder="Date" class="leg-date" style="max-width:100px">
          </div>
        </div>
        <button class="btn-add-leg" onclick="addLeg()">+ Add Leg</button>
        <button class="btn-quote" onclick="submitQuote('safari')">Get Instant Quote</button>
      </div>
    </div>
  </div>

  <div class="trust-bar" id="trust-bar"></div>

  <div class="inner">
    <div id="loading" style="display:none;margin-top:20px">
      <div class="loading-card">
        <div class="spinner-lg"></div>
        <div class="loading-text" id="loading-text">Calculating</div>
      </div>
    </div>
    <div id="error-box" style="display:none;margin-top:16px"></div>
    <div id="results" style="display:none;margin-top:4px">
      <div class="section-label">Your Quote</div>
      <div id="results-inner"></div>
      <div class="validity-notice" id="validity-notice"></div>
      <div class="fx-widget" id="fx-widget" style="display:none">
        <div class="fx-title">Live Currency Conversion</div>
        <div class="fx-grid" id="fx-grid"></div>
        <div class="fx-updated" id="fx-updated"></div>
      </div>
      <div class="cta-block">
        <a id="btn-whatsapp" class="btn-whatsapp" href="#" target="_blank">

<script>
// Quotecloud JG v2.5.2 - Black & White luxury skin
let config = {};
let fxRates = {};
let lastResults = [];
let GAPI_KEY = '';

async function init() {
  try {
    let r = await fetch('/settings/config/public');
    config = await r.json();
    let kr = await fetch('/get_maps_key');
    let kd = await kr.json();
    GAPI_KEY = kd.key || '';
    applyBranding();
    document.body.style.visibility = 'visible';
    loadFX();
  } catch(e) { console.error('Init failed:', e); document.body.style.visibility = 'visible'; }
}

function applyBranding() {
  document.getElementById('page-title').textContent = (config.company_name||'Charter') + ' — Instant Quotes';
  let logo = document.getElementById('header-logo');
  let footerLogo = document.getElementById('footer-logo');
  if (config.logo_url) {
    logo.src = config.logo_url; logo.alt = config.company_name||'';
    footerLogo.src = config.logo_url; footerLogo.alt = config.company_name||'';
  } else { logo.style.display = 'none'; footerLogo.style.display = 'none'; }
  document.getElementById('header-tagline').textContent = config.tagline||'Private Aviation';
  let region = (config.geo_lock||{}).region_name||'Kenya';
  document.getElementById('header-region').textContent = region;
  document.getElementById('hero-sub').textContent = `${region}'s premier charter aviation`;
  let tb = (config.trust_bar||[]).filter(Boolean);
  let tbEl = document.getElementById('trust-bar');
  if (tb.length) tbEl.innerHTML = tb.map(item=>`<div class="trust-item"><span class="trust-dot"></span>${item}</div>`).join('');
  else tbEl.style.display = 'none';
  let wa = (config.contact||{}).whatsapp||'';
  let phone = (config.contact||{}).phone||'';
  let greeting = (config.contact||{}).whatsapp_greeting||"Hi, I'd like to enquire about a charter flight.";
  if (wa) document.getElementById('btn-whatsapp').href = `https://wa.me/${wa}?text=${encodeURIComponent(greeting)}`;
  else document.getElementById('btn-whatsapp').style.display = 'none';
  if (phone) document.getElementById('btn-call').href = `tel:${phone}`;
  else document.getElementById('btn-call').style.display = 'none';
  let c = config.contact||{};
  let parts = [c.address, c.email, c.phone].filter(Boolean);
  document.getElementById('footer-contact').innerHTML = parts.join(' &nbsp;·&nbsp; ');
  if (config.footer_tagline) {
    let ft = document.createElement('div');
    ft.style.cssText = 'margin-top:6px;color:rgba(255,255,255,0.2);font-size:0.65rem';
    ft.textContent = config.footer_tagline;
    document.getElementById('site-footer').insertBefore(ft, document.querySelector('.footer-powered'));
  }
}

async function loadFX() {
  try {
    let r = await fetch('/fx/rates');
    let data = await r.json();
    if (data.success) {
      fxRates = data.rates;
      if (data.updated) document.getElementById('fx-updated').textContent = 'Rates: ' + new Date(data.updated).toLocaleDateString();
    }
  } catch(e) {}
}

function updateFX() {
  let usd = parseFloat(document.getElementById('fx-input').value)||0;
  let currencies = ['KES','EUR','GBP','TZS','UGX'];
  document.getElementById('fx-grid').innerHTML = currencies.map(c=>{
    let rate = fxRates[c]||0;
    let amount = usd*rate;
    let fmt = amount>=1000?amount.toLocaleString(undefined,{maximumFractionDigits:0}):amount.toLocaleString(undefined,{maximumFractionDigits:2});
    return `<div class="fx-item"><div class="fx-currency">${c}</div><div class="fx-amount">${fmt}</div></div>`;
  }).join('');
}

function swapLocations() {
  let p = document.getElementById('ow-pickup');
  let d = document.getElementById('ow-dropoff');
  let tmp = p.value; p.value = d.value; d.value = tmp;
}

function isMapsUrl(s) {
  return s && (s.includes('maps.app.goo.gl')||s.includes('goo.gl')||s.includes('google.com/maps')||s.includes('maps.google'));
}

function extractCoordsFromUrl(url) {
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  let m2 = url.match(/!3d(-?\d+\.\d+).*?!4d(-?\d+\.\d+)/);
  if (m2) return { lat: parseFloat(m2[1]), lng: parseFloat(m2[2]) };
  let m3 = url.match(/[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m3) return { lat: parseFloat(m3[1]), lng: parseFloat(m3[2]) };
  return null;
}

async function reverseGeocode(lat, lng) {
  if (!GAPI_KEY) return `${lat},${lng}`;
  try {
    let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GAPI_KEY}&region=ke`);
    let data = await r.json();
    if (data.status==='OK') {
      let components = data.results[0].address_components;
      let locality = components.find(c=>c.types.includes('locality'));
      let admin = components.find(c=>c.types.includes('administrative_area_level_1'));
      if (locality&&admin) return `Pin, ${locality.long_name}, ${admin.long_name}`;
      if (locality) return `Pin, ${locality.long_name}`;
      let addr = data.results[0].formatted_address;
      if (addr&&!addr.includes('+')) return `Pin, ${addr}`;
    }
  } catch(e) {}
  return `Pin, ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}

async function resolveMapsShortUrl(url) {
  try {
    let proxyRes = await fetch('/expand_maps_url', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url}), signal:AbortSignal.timeout(8000)
    });
    let proxyData = await proxyRes.json();
    let finalUrl = proxyData.final_url || '';
    if (finalUrl) {
      let coords = extractCoordsFromUrl(finalUrl);
      if (coords) {
        let display = await reverseGeocode(coords.lat, coords.lng);
        return { coords:`${coords.lat},${coords.lng}`, display };
      }
    }
    let ftidMatch = finalUrl.match(/ftid=([^&]+)/);
    if (ftidMatch && GAPI_KEY) {
      let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?place_id=${encodeURIComponent(ftidMatch[1])}&key=${GAPI_KEY}`);
      let data = await r.json();
      if (data.status==='OK') {
        let loc = data.results[0].geometry.location;
        let display = await reverseGeocode(loc.lat, loc.lng);
        return { coords:`${loc.lat},${loc.lng}`, display };
      }
    }
    let expandedObj = finalUrl ? new URL(finalUrl) : new URL(url);
    let q = expandedObj.searchParams.get('q')||expandedObj.searchParams.get('query')||'';
    if (!q) {
      let pathMatch = url.match(/place\/([^\/\?@]+)/);
      if (pathMatch) q = decodeURIComponent(pathMatch[1].replace(/\+/g,' '));
    }
    if (q && GAPI_KEY) {
      let region = (config.geo_lock||{}).region_name||'Kenya';
      let query = q.toLowerCase().includes(region.toLowerCase()) ? q : `${q} ${region}`;
      let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${GAPI_KEY}&region=ke`);
      let data = await r.json();
      if (data.status==='OK') {
        let loc = data.results[0].geometry.location;
        let display = await reverseGeocode(loc.lat, loc.lng);
        return { coords:`${loc.lat},${loc.lng}`, display };
      }
    }
  } catch(e) {}
  return null;
}

async function resolveLocationClientSide(input) {
  if (!input||!input.trim()) return null;
  let s = input.trim();
  if (isMapsUrl(s)) {
    let coords = extractCoordsFromUrl(s);
    if (coords) {
      let display = await reverseGeocode(coords.lat, coords.lng);
      return { resolved:`${coords.lat},${coords.lng}`, display };
    }
    let resolved = await resolveMapsShortUrl(s);
    if (resolved) return { resolved:resolved.coords, display:resolved.display };
    return null;
  }
  return { resolved:s, display:s };
}

function showMission(m, el) {
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['one_way','return','safari'].forEach(id=>{
    document.getElementById('m-'+id).style.display = id===m?'block':'none';
  });
}

function parseSmartDate(s) {
  s = s.trim().replace(/(\d+)(st|nd|rd|th)/gi,'$1');
  const fmts = [
    { r:/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/, fn:m=>{ let y=m[3].length===2?'20'+m[3]:m[3]; return new Date(`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`); }},
    { r:/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/, fn:m=>new Date(`${m[2]} ${m[1]} ${m[3]}`) },
    { r:/^([A-Za-z]+)\s+(\d{1,2})\s+(\d{4})$/, fn:m=>new Date(`${m[1]} ${m[2]} ${m[3]}`) },
  ];
  for (let f of fmts) {
    let m = s.match(f.r);
    if (m) {
      let d = f.fn(m);
      if (!isNaN(d)) {
        let dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0'), yy=String(d.getFullYear()).slice(-2);
        return `${dd}/${mm}/${yy}`;
      }
    }
  }
  return s;
}

function addLeg() {
  let n = document.querySelectorAll('#safari-legs .leg-row').length + 1;
  let div = document.createElement('div');
  div.className = 'leg-row';
  div.innerHTML = `<span class="leg-num">${n}</span>
    <input type="text" placeholder="From" class="leg-origin">
    <input type="text" placeholder="To" class="leg-dest">
    <input type="text" placeholder="Date" class="leg-date" style="max-width:100px">
    <button onclick="this.parentElement.remove()" style="padding:5px 9px;border:1px solid #e0e0e0;background:#fff;color:#888;border-radius:2px;cursor:pointer;font-size:0.8rem;font-weight:700;font-family:'DM Sans',sans-serif">x</button>`;
  document.getElementById('safari-legs').appendChild(div);
}

function showResolving(show) {
  let bar = document.getElementById('resolving-bar');
  if (show) bar.classList.add('active');
  else bar.classList.remove('active');
}

async function submitQuote(mission) {
  let body = { mission };
  showLoading(true, 'Calculating');
  hideError();
  document.getElementById('results').style.display = 'none';
  try {
    if (mission==='one_way') {
      let rawP = document.getElementById('ow-pickup').value.trim();
      let rawD = document.getElementById('ow-dropoff').value.trim();
      if (!rawP||!rawD) { showLoading(false); return showError('Please enter both From and To locations.'); }
      showResolving(true);
      let p = await resolveLocationClientSide(rawP);
      let d = await resolveLocationClientSide(rawD);
      showResolving(false);
      body.pickup = (p&&isMapsUrl(rawP)) ? p.resolved : rawP;
      body.dropoff = (d&&isMapsUrl(rawD)) ? d.resolved : rawD;
    } else if (mission==='return') {
      let rawP = document.getElementById('rt-pickup').value.trim();
      let rawD = document.getElementById('rt-dropoff').value.trim();
      if (!rawP||!rawD) { showLoading(false); return showError('Please enter both From and To locations.'); }
      showResolving(true);
      let p = await resolveLocationClientSide(rawP);
      let d = await resolveLocationClientSide(rawD);
      showResolving(false);
      body.pickup = (p&&isMapsUrl(rawP)) ? p.resolved : rawP;
      body.dropoff = (d&&isMapsUrl(rawD)) ? d.resolved : rawD;
      body.depart = parseSmartDate(document.getElementById('rt-depart').value);
      body.return_date = parseSmartDate(document.getElementById('rt-return').value);
      if (!body.depart||!body.return_date) { showLoading(false); return showError('Please enter departure and return dates.'); }
    } else {
      body.legs = [];
      let rows = document.querySelectorAll('#safari-legs .leg-row');
      showResolving(true);
      for (let row of rows) {
        let rawO = row.querySelector('.leg-origin').value.trim();
        let rawD2 = row.querySelector('.leg-dest').value.trim();
        let dt = parseSmartDate(row.querySelector('.leg-date').value);
        if (rawO&&rawD2) {
          let o = await resolveLocationClientSide(rawO);
          let d2 = await resolveLocationClientSide(rawD2);
          body.legs.push({ origin:(o&&isMapsUrl(rawO))?o.resolved:rawO, destination:(d2&&isMapsUrl(rawD2))?d2.resolved:rawD2, date:dt });
        }
      }
      showResolving(false);
      if (!body.legs.length) { showLoading(false); return showError('Please add at least one leg.'); }
    }
    showLoading(true, 'Calculating');
    let r = await fetch('/quote/calculate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    let data = await r.json();
    showLoading(false);
    if (!r.ok) { showError(data.error||'Unable to calculate. Please try again.'); return; }
    lastResults = data.results||[];
    renderResults(lastResults, mission);
  } catch(e) {
    showLoading(false); showResolving(false);
    showError('Network error. Please check your connection and try again.');
  }
}

function showLoading(show, text) {
  document.getElementById('loading').style.display = show?'block':'none';
  if (text) document.getElementById('loading-text').textContent = text;
}

function showError(msg) {
  let el = document.getElementById('error-box');
  el.innerHTML = `<div class="error-card">${msg}</div>`;
  el.style.display = 'block';
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

function hideError() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('error-box').innerHTML = '';
}

function tagClass(t, note) {
  if (note) return note.toLowerCase().includes('idle')?'tag-idle':'tag-overnight';
  return t==='revenue'?'tag-rev':t==='positioning'?'tag-pos':t==='depositioning'?'tag-dep':'tag-rep';
}

function fmtHours(h) {
  h = parseFloat(h) || 0;
  let totalMins = Math.ceil(h * 60);
  if (totalMins < 60) return totalMins + ' mins';
  let hrs = Math.floor(totalMins / 60);
  let mins = totalMins % 60;
  if (mins === 0) return hrs + ' hr' + (hrs !== 1 ? 's' : '');
  return hrs + ' hr ' + mins + ' mins';
}

function renderSegments(segs, showDist) {
  if (!segs||!segs.length) return '';
  let rows = segs.map(s=>{
    let isNote = s.note&&!s.type;
    if (isNote) {
      let label = s.note.toLowerCase().includes('idle')?'Idle Day':'Overnight';
      let cost = s.cost?`$${parseFloat(s.cost).toLocaleString(undefined,{minimumFractionDigits:2})}`:'—';
      return `<tr><td><span class="tag ${tagClass(null,s.note)}">${label}</span></td><td colspan="2" style="color:#aaa;font-size:0.78rem;font-family:'DM Sans',sans-serif">${s.note}</td>${showDist?'<td>—</td>':''}<td style="font-weight:600;font-family:'DM Sans',sans-serif">${cost}</td><td>—</td></tr>`;
    }
    let nm = s.nm||s.dist_nm||0;
    return `<tr><td><span class="tag ${tagClass(s.type,null)}">${s.type}</span></td><td>${s.origin||''}</td><td>${s.destination||''}</td>${showDist?`<td style="font-family:'DM Sans',sans-serif;font-size:0.78rem">${nm?nm+' nm':'—'}</td>`:''}<td style="font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500">${s.hours?fmtHours(s.hours):'—'}</td><td style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:#888">${s.date||'—'}</td></tr>`;
  }).join('');
  let dh = showDist?'<th>Dist</th>':'';
  return `<div class="route-wrap"><table class="route-table"><thead><tr><th>Leg</th><th>From</th><th>To</th>${dh}<th>Time</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function calcHours(segs) {
  let t=0; (segs||[]).forEach(s=>{if(s.hours&&s.type)t+=parseFloat(s.hours);}); return Math.round(t*10)/10;
}

function renderBilling(res) {
  let rate=res.rate_usd||0, hrs=calcHours(res.segments||[]), rows='';
  if (hrs>0&&rate>0) {
    let fc=Math.round(hrs*rate*100)/100;
    let minHrs=res.min_chargeable_hrs||0;
    let minMsg=(minHrs>0&&res.min_applied)?`<div style="font-family:'DM Sans',sans-serif;font-size:0.72rem;color:#e65100;background:#fff3e0;border-radius:2px;padding:5px 10px;margin-bottom:6px">Minimum charge of ${minHrs.toFixed(1)} flight hours applies.</div>`:"";
    rows+=`${minMsg}<div class="billing-row"><span>Aircraft Charter</span><span>$${fc.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  let fee=res.pax_fee_usd||res.pax_fee_usd_display||0;
  if (fee>0) rows+=`<div class="billing-row"><span>Taxes & Admin</span><span>$${parseFloat(fee).toLocaleString()}</span></div>`;
  let ov=res.overnight_usd||res.overnight_cost_usd||0, oRate=res.overnight_rate_usd||0;
  if (ov>0&&oRate>0) {
    let n=Math.round(ov/oRate);
    rows+=`<div class="billing-row"><span>Overnight Per Diem <span style="color:#aaa;font-size:0.72rem">${n} night${n!==1?'s':''} @ $${oRate}</span></span><span>$${parseFloat(ov).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  let wu=res.waiting_usd||res.idle_cost_usd||0, ir=res.idle_day_rate_usd||0;
  if (wu>0) {
    let days=ir>0?Math.round(wu/ir):1;
    rows+=`<div class="billing-row"><span>Idle Day <span style="color:#aaa;font-size:0.72rem">${days} day${days!==1?'s':''} @ $${ir.toLocaleString()}</span></span><span>$${parseFloat(wu).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  return `<div class="billing">${rows}<div class="billing-total"><span>Total Estimate</span><span>USD $${(res.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div></div>`;
}

function renderOneAc(res, showDist, isDark) {
  if (res.error) return `<div class="error-card">${res.error}</div>`;
  let isFixed = res.ac_type==='fixed_wing';
  let badgeClass = isDark ? (isFixed?'badge-fixed':'badge-heli') : (isFixed?'badge-fixed-light':'badge-heli-light');
  let badgeText = isFixed ? '✈ Fixed Wing' : '🚁 Helicopter';
  let disclaimer = isFixed?`<div class="info-box">${config.landing_field_disclaimer||'Fixed wing aircraft. Runway required. Contact us to confirm suitability.'}</div>`:'';
  let headerClass = isDark ? 'ac-header dark' : 'ac-header light';
  let content='';
  if (res.mission==='return_both') {
    let wd=res.wait_days, maxN=res.max_nights||3;
    if (wd>=maxN) {
      let b=res.option_b;
      let bRes={segments:[...(b.drop.segments||[]),...(b.pick.segments||[])],rate_usd:res.rate_usd,overnight_rate_usd:res.overnight_rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display,total_usd:b.total_usd};
      content=`<div class="pickup-drop-msg">${res.pickup_drop_msg||'Pick & Drop applies.'}</div><div class="drop-label">Drop Off</div>${renderSegments(b.drop.segments,showDist)}<div class="drop-label">Pick Up</div>${renderSegments(b.pick.segments,showDist)}${renderBilling(bRes)}`;
    } else {
      let aRes={...res.option_a,rate_usd:res.rate_usd,overnight_rate_usd:res.overnight_rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display};
      let bRes2={segments:[...(res.option_b.drop.segments||[]),...(res.option_b.pick.segments||[])],rate_usd:res.rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display,total_usd:res.option_b.total_usd};
      content=`<div class="info-box">Aircraft availability subject to operational schedule.</div>
        <div class="option-tabs"><div class="otab active" onclick="switchOtab(this,'oa-${res.ac_key}')">Option A — Waits</div><div class="otab" onclick="switchOtab(this,'ob-${res.ac_key}')">Option B — Pick & Drop</div></div>
        <div class="otab-content active" id="oa-${res.ac_key}">${renderSegments(res.option_a.segments,showDist)}${renderBilling(aRes)}</div>
        <div class="otab-content" id="ob-${res.ac_key}"><div class="drop-label">Drop Off</div>${renderSegments(res.option_b.drop.segments,showDist)}<div class="drop-label">Pick Up</div>${renderSegments(res.option_b.pick.segments,showDist)}${renderBilling(bRes2)}</div>`;
    }
  } else {
    content = renderSegments(res.segments,showDist)+renderBilling(res);
  }
  return `<div class="${headerClass}">
    <div>
      <div class="ac-title">${res.ac_label||''}</div>
      <div class="ac-sub">${isFixed?'Fixed Wing':'Helicopter'} · ${res.home_airstrip||''}</div>
    </div>
    <span class="ac-badge ${badgeClass}">${badgeText}</span>
  </div>${content}${disclaimer}`;
}

function switchOtab(el, id) {
  let parent=el.closest('.ac-card');
  parent.querySelectorAll('.otab').forEach(t=>t.classList.remove('active'));
  parent.querySelectorAll('.otab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function renderResults(results, mission) {
  let showDist=(config.quoting_rules||{}).show_distance_to_client||false;
  document.getElementById('results-inner').innerHTML = results.map((res,i)=>`
    <div class="ac-card" style="animation-delay:${i*0.08}s;animation-fill-mode:both">
      ${renderOneAc(res, showDist, i===0)}
    </div>`).join('');
  let hours=(config.quoting_rules||{}).quote_validity_hours||48;
  document.getElementById('validity-notice').textContent=`Quote valid for ${hours} hours · Subject to availability`;
  if (results.length && fxRates['KES']) {
    let kesRate = fxRates['KES'];
    document.getElementById('fx-grid').innerHTML = results.filter(r=>!r.error).map(res=>{
      let total = res.mission==='return_both'?(res.option_a?.total_usd||0):(res.total_usd||0);
      let kes = Math.round(total * kesRate).toLocaleString();
      return `<div class="fx-row"><span class="fx-row-label">${res.ac_label||''}</span><span class="fx-row-amount">KES ${kes}</span></div>`;
    }).join('');
    document.getElementById('fx-widget').style.display='block';
  }

  buildWhatsApp(results, mission);
  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function buildWhatsApp(results, mission) {
  let wa=(config.contact||{}).whatsapp||'';
  if (!wa) return;
  let greeting=(config.contact||{}).whatsapp_greeting||"Hi, I'd like to enquire about a charter quote.";
  let lines=[greeting,''];
  results.forEach(res=>{
    if (res.error) return;
    lines.push(`*${res.ac_label}*`);
    if (res.mission==='return_both') {
      let wd=res.wait_days, maxN=res.max_nights||3;
      if (wd>=maxN) {
        let b=res.option_b;
        lines.push(`Pick & Drop — USD $${(b.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        (b.drop?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`Drop: ${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
        (b.pick?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`Pick: ${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
      } else {
        lines.push(`Option A (Waits) — USD $${(res.option_a?.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        lines.push(`Option B (Pick & Drop) — USD $${(res.option_b?.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        (res.option_a?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
      }
    } else {
      lines.push(`USD $${(res.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
      (res.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
    }
    lines.push('');
  });
  lines.push('Please confirm availability. Thank you.');
  document.getElementById('btn-whatsapp').href=`https://wa.me/${wa}?text=${encodeURIComponent(lines.join('\n'))}`;
}

function resetQuote() {
  document.getElementById('results').style.display='none';
  hideError(); lastResults=[];
  ['ow-pickup','ow-dropoff','rt-pickup','rt-dropoff','rt-depart','rt-return'].forEach(id=>{
    let el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('quote-card').scrollIntoView({behavior:'smooth',block:'start'});
}

init();
</script>
</body>
</html>
